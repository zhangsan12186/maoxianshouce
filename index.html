<!DOCTYPE html>
<html>
<head>
    <title>冒险手册伤害对比计算器</title>
</head>
<body>
    <h2>🗡️ 冒险手册伤害对比计算器</h2>
    <p style="color:#666; font-size:14px;">支持 K（千）和 M（百万）单位！例如：100K = 100,000；1.5M = 1,500,000</p>
    
    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <!-- 变更前 面板 -->
        <div class="content-box" style="flex: 1; min-width: 300px; border: 1px solid #ccc;">
            <h3 style="margin-top: 0; color: #2c3e50;">📉 变更前 (当前)</h3>
            
            <div style="margin-bottom: 10px;">
                <label>面板攻击:</label>
                <input type="text" id="p1_old" value="1K" style="width:80px; float:right; text-align:right;">
            </div>
            <div style="margin-bottom: 10px; clear:both;">
                <label>倍率1 (%):</label>
                <input type="number" id="r1_old" value="2.49" step="0.01" style="width:80px; float:right; text-align:right;">
                <span style="color:#666; font-size:12px; float:right; margin-left:5px;">(填小数)</span>
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>魔力:</label>
                <input type="text" id="p2_old" value="500" style="width:80px; float:right; text-align:right;">
            </div>
            <div style="margin-bottom: 10px; clear:both;">
                <label>倍率2 (%):</label>
                <input type="number" id="r2_old" value="2.0" step="0.01" style="width:80px; float:right; text-align:right;">
                <span style="color:#666; font-size:12px; float:right; margin-left:5px;">(填小数)</span>
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>技能基础增幅(%):</label>
                <input type="number" id="baseInc_old" value="50" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;" title="包含：技能伤害、对应元素伤害、全元素伤害、直接伤害、武器伤害增幅、对精英/怪物/种族伤害等">
                <label>技能/元素增伤(%):</label>
                <input type="number" id="inc_old" value="130" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>最终伤害加成(%):</label>
                <input type="number" id="finalInc_old" value="100" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>暴击伤害(%):</label>
                <input type="number" id="critDmg_old" value="150" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>目标防御力:</label>
                <input type="text" id="def_old" value="5K" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>无视防御(%):</label>
                <input type="number" id="pen_old" value="10" style="width:80px; float:right; text-align:right;">
            </div>
        </div>

        <!-- 变更后 面板 -->
        <div class="content-box" style="flex: 1; min-width: 300px; border: 1px solid #27ae60; background-color: rgba(250, 255, 250, 0.9);">
            <h3 style="margin-top: 0; color: #27ae60;">📈 变更后 (提升目标)</h3>
            
            <div style="margin-bottom: 10px;">
                <label>面板攻击:</label>
                <input type="text" id="p1_new" value="1.1K" style="width:80px; float:right; text-align:right;">
            </div>
            <div style="margin-bottom: 10px; clear:both;">
                <label>倍率1 (%):</label>
                <input type="number" id="r1_new" value="2.49" step="0.01" style="width:80px; float:right; text-align:right;">
                <span style="color:#666; font-size:12px; float:right; margin-left:5px;">(填小数)</span>
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>魔力:</label>
                <input type="text" id="p2_new" value="500" style="width:80px; float:right; text-align:right;">
            </div>
            <div style="margin-bottom: 10px; clear:both;">
                <label>倍率2 (%):</label>
                <input type="number" id="r2_new" value="2.0" step="0.01" style="width:80px; float:right; text-align:right;">
                <span style="color:#666; font-size:12px; float:right; margin-left:5px;">(填小数)</span>
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>技能基础增幅(%):</label>
                <input type="number" id="baseInc_new" value="50" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;" title="包含：技能伤害、对应元素伤害、全元素伤害、直接伤害、武器伤害增幅、对精英/怪物/种族伤害等">
                <label>技能/元素增伤(%):</label>
                <input type="number" id="inc_new" value="130" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>最终伤害加成(%):</label>
                <input type="number" id="finalInc_new" value="100" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>暴击伤害(%):</label>
                <input type="number" id="critDmg_new" value="150" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>目标防御力:</label>
                <input type="text" id="def_new" value="5K" style="width:80px; float:right; text-align:right;">
            </div>

            <div style="margin-bottom: 10px; clear:both;">
                <label>无视防御(%):</label>
                <input type="number" id="pen_new" value="10" style="width:80px; float:right; text-align:right;">
            </div>
        </div>
    </div>
    
    <br>
    <button onclick="calc()" style="width:100%; padding: 15px; font-size: 18px; background-color: #2980b9; color: white; border:none; border-radius: 5px; cursor:pointer;">🚀 开始对比计算</button>
    
    <div id="result" class="content-box" style="margin-top: 20px; padding: 20px; background-color: rgba(236, 240, 241, 0.9); display:none;">
        <h3 style="margin-top: 0;">📊 计算结果对比</h3>
        <p id="oldDmg" style="font-size: 16px;"></p>
        <p id="newDmg" style="font-size: 16px;"></p>
        <hr>
        <p id="diff" style="font-size: 18px; font-weight: bold;"></p>
    </div>

    <script>
    // 转换函数：将带单位的字符串转换为数字
    function parseValue(valueStr) {
        if (!valueStr || valueStr.trim() === '') return 0;
        let str = valueStr.toUpperCase().trim();
        if (str.includes('M')) {
            let num = parseFloat(str.replace('M', ''));
            return isNaN(num) ? 0 : num * 1000000;
        } else if (str.includes('K')) {
            let num = parseFloat(str.replace('K', ''));
            return isNaN(num) ? 0 : num * 1000;
        } else {
            let num = parseFloat(str);
            return isNaN(num) ? 0 : num;
        }
    }

    function calc() {
        // 获取变更前的数据
        let p1_o = parseValue(document.getElementById('p1_old').value);
        let r1_o = parseFloat(document.getElementById('r1_old').value);
        let p2_o = parseValue(document.getElementById('p2_old').value);
        let r2_o = parseFloat(document.getElementById('r2_old').value);
        let baseInc_o = parseFloat(document.getElementById('baseInc_old').value) / 100;
        let inc_o = parseFloat(document.getElementById('inc_old').value) / 100;
        let finalInc_o = parseFloat(document.getElementById('finalInc_old').value) / 100;
        let critDmg_o = parseFloat(document.getElementById('critDmg_old').value) / 100;
        let def_o = parseValue(document.getElementById('def_old').value);
        let pen_o = parseFloat(document.getElementById('pen_old').value) / 100;

        // 获取变更后的数据
        let p1_n = parseValue(document.getElementById('p1_new').value);
        let r1_n = parseFloat(document.getElementById('r1_new').value);
        let p2_n = parseValue(document.getElementById('p2_new').value);
        let r2_n = parseFloat(document.getElementById('r2_new').value);
        let baseInc_n = parseFloat(document.getElementById('baseInc_new').value) / 100;
        let inc_n = parseFloat(document.getElementById('inc_new').value) / 100;
        let finalInc_n = parseFloat(document.getElementById('finalInc_new').value) / 100;
        let critDmg_n = parseFloat(document.getElementById('critDmg_new').value) / 100;
        let def_n = parseValue(document.getElementById('def_new').value);
        let pen_n = parseFloat(document.getElementById('pen_new').value) / 100;

        // 计算变更前伤害
        let atk_o = (p1_o * r1_o + p2_o * r2_o) * (1 + baseInc_o);
        let realDef_o = def_o * (1 - pen_o);
        let baseDmg_o = atk_o * (1 - realDef_o / (atk_o + realDef_o));
        let finalDmg_o = baseDmg_o * (1 + inc_o) * (1 + finalInc_o) * (1 + critDmg_o);
        
        // 计算变更后伤害
        let atk_n = (p1_n * r1_n + p2_n * r2_n) * (1 + baseInc_n);
        let realDef_n = def_n * (1 - pen_n);
        let baseDmg_n = atk_n * (1 - realDef_n / (atk_n + realDef_n));
        let finalDmg_n = baseDmg_n * (1 + inc_n) * (1 + finalInc_n) * (1 + critDmg_n);

        // 计算差值和百分比
        let diffVal = finalDmg_n - finalDmg_o;
        let diffPer = ((finalDmg_n / finalDmg_o) - 1) * 100;

        // 更新页面显示
        document.getElementById('oldDmg').innerText = "📉 变更前伤害: " + Math.round(finalDmg_o).toLocaleString();
        document.getElementById('newDmg').innerText = "📈 变更后伤害: " + Math.round(finalDmg_n).toLocaleString();
        
        let diffElement = document.getElementById('diff');
        diffElement.innerText = "✨ 伤害提升: " + Math.round(diffVal).toLocaleString() + " (" + diffPer.toFixed(2) + "%)";
        
        // 根据正负设置颜色
        if (diffPer > 0) {
            diffElement.style.color = "#27ae60"; 
        } else if (diffPer < 0) {
            diffElement.style.color = "#c0392b";
        } else {
            diffElement.style.color = "#2c3e50";
        }

        // 显示结果区域
        document.getElementById('result').style.display = 'block';
    }
    </script>
</body>
</html>
